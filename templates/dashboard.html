<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DashBoard</title>
    <!--Css link -->
    <link
      rel="stylesheet"
      href="{{url_for('static',filename='CSS/style.css')}}"
    />
    <!--bootsrap links -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <!--font asesome link-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body class="dashboard">
    <!-- nav bar for dashboard -->
    <nav class="navbar navbar-expand-lg bg-white shadow-sm py-3">
      <div class="container d-flex justify-content-between align-items-center">
    
        <!-- Welcome section -->
        <div>
          <h4 class="fw-bold mb-0">
            Welcome
            <span id="username" class="text-primary"></span>
          </h4>
    
          <small class="text-secondary">
            Let's manage your finances today.
          </small>
        </div>
    
    
        <!-- Buttons section -->
        <div class="d-flex align-items-center gap-3">
    
          <button
            class="btn btn-light rounded-circle"
            id="themeBtn">
            <i class="bi bi-moon-fill" id="themeIcon"></i>
          </button>
    
    
          <a href="/" class="btn btn-outline-danger logout-btn">
            <i class="bi bi-box-arrow-right"></i>
            Logout
          </a>
    
        </div>
    
      </div>
    </nav>

    <!-- card of balance, income and expanse  -->
    <div class="container mt-4">
      <div class="row g-4">
        <div class="col-lg-4">
          <div class="summary-card">
            <h5>Current Balance</h5>

            <h2 id="balance">$0</h2>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="summary-card income">
            <h5>Total Income</h5>

            <h2 id="income">$0</h2>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="summary-card expense">
            <h5>Total Expenses</h5>

            <h2 id="expense">$0</h2>
          </div>
        </div>
      </div>
    </div>

    <!-- add transaction -->
<div class="d-flex justify-content-center  align-items-center  mt-5">

    <button
      class="btn btn-primary add-btn"
      data-bs-toggle="modal"
      data-bs-target="#transactionModal">

      <i class="bi bi-plus-circle"></i>
      Add Transaction

    </button>

</div>

<!-- Search and Filter -->
<div class="container mt-5">
    <div class="row g-3">
        <!-- Filter -->
        <div class="col-md-4">
            <select class="form-select" id="filterType">

                <option value="All">All</option>

                <option value="Income">Income</option>

                <option value="Expense">Expense</option>

            </select>
        </div>
    </div>
</div>

    <!-- transaction table  -->
    <div class="container mt-4">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th>Title</th>
              
              <th>Type</th>

              <th>Category</th>

              <th>Amount</th>

              <th>Date</th>

              <th>Actions</th>
            </tr>
          </thead>

          <tbody id="transactions-table">
            <tr>
              <td colspan="5" class="text-center">No transactions yet.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- transaction model  -->
    <div
      class="modal fade"
      id="transactionModal"
      tabindex="-1"
      aria-labelledby="transactionModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h4 class="modal-title" id="transactionModal">Add Transaction</h4>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <form id="transaction-form">
               <div class="mb-3">
    <label class="form-label">Title</label>

    <input
        type="text"
        class="form-control"
        id="title"
    >

    <div id="titleError" class="invalid-feedback"></div>
</div>
              <!-- Type -->

              <div class="mb-3">

                <label class="form-label">
                    Type
                </label>
            
                <select class="form-select" id="type" aria-placeholder="Select Type..">
            
                    <option value="Income">
                        Income
                    </option>
            
                    <option value="Expense">
                        Expense
                    </option>
            
                </select>
            
            </div>
              <!-- Amount -->

              <div class="mb-3">
                <label class="form-label"> Amount </label>

                <input
                  type="number"
                  class="form-control"
                  id="amount"
                  required
                />
              </div>

              <!-- Category -->

              <div class="mb-3">
                <label class="form-label"> Category </label>

                <select class="form-select" id="category" aria-placeholder="Select Category..">
                  <option>Food</option>
                  <option>Transport</option>
                  <option>Shopping</option>
                  <option>Bills</option>
                  <option>Salary</option>
                  <option>Entertainment</option>
                </select>
              </div>

              <!-- Date -->

              <div class="mb-3">
                <label class="form-label"> Date </label>

                <input type="date" class="form-control" id="date" />
              </div>
            </form>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Cancel
            </button>

            <button
            type="button"
            class="btn btn-primary"
            id="saveTransaction">
            Save Transaction
        </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{url_for('static',filename='javascript/dashboard.js')}}"></script>
  </body>
</html>
