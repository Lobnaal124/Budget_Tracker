<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <!--Css link -->
    <link rel="stylesheet" href="{{url_for('static',filename='CSS/style.css')}}">
    <!--bootsrap links -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!--font asesome link-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body class="registe">
    <!--header of the budget tracker -->
    <header class="py-4">
        <div class="container">
            <h1 class="fw-bold text-white">
                <i class="bi bi-wallet2 text-primary"></i>
                Budget<span class="text-primary">Tracker</span>
            </h1>
        </div>
    </header>
    <!--input user name and pass and confim pass -->
    <div class="container ">

        <div class="row justify-content-center">
    
            <div class="col-md-6 col-lg-5">
    
                <div class="card shadow-lg border-0 rounded-4 p-4">
    
                    <h2 class="text-center mb-4">
                        Create Account
                    </h2>
    
                    <form id="register">
    
                        <!-- Username -->
                        <div class="mb-3 ">
                            <label class="form-label">Username</label>
    
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-person"></i>
                                </span>
    
                                <input
                                    type="text"
                                    class="form-control"
                                    placeholder="Enter your username"
                                    id="username"
                                    required>
                            </div>
                            <div id="usernameError" class="invalid-feedback"></div>
                        </div>
    
                        <!-- Email -->
                        <div class="mb-3" >
                            <label class="form-label">Email</label>
    
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-envelope"></i>
                                </span>
    
                                <input
                                    type="email"
                                    class="form-control"
                                    placeholder="Enter your email"
                                    id="email"
                                    required>
                            </div>
                            <div id="emailError" class="invalid-feedback"></div>
                        </div>
    
                        <!-- Password -->
                        <div class="mb-3 " >
                            <label class="form-label">Password</label>
    
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-lock"></i>
                                </span>
    
                                <input
                                    type="password"
                                    class="form-control"
                                    placeholder="Enter your password"
                                    id="password"
                                    required>
                                <div id="passError" class="invalid-feedback text-danger"></div>
                            </div>
                        </div>
    
                        <!-- Confirm Password -->
                        <div class="mb-4 " >
                            <label class="form-label">Confirm Password</label>
    
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-shield-lock"></i>
                                </span>
    
                                <input
                                    type="password"
                                    class="form-control"
                                    placeholder="Confirm your password"
                                    id="confirmPassword"
                                    required>
                            </div>
                            <div id="confirmError" class="invalid-feedback"></div>
                        </div>
    
                        <!-- Register Button -->
                        <div class="d-grid gap-3 ">
                            <button
                                type="submit"
                                class="btn btn-primary btn-lg">
                                Create Account
                            </button>
                            <div class="text-center mt-4">
                                <span class="text-muted">
                                    Already have an account?
                                </span>
                                <a href="/login" class="signin-link ms-1">
                                    Sign In
                                </a>
                            </div>
                        </div>
    
                    </form>
    
                </div>
    
            </div>
    
        </div>
    
    </div>

 <script src="{{url_for('static',filename='javascript/registe.js')}}"></script>

</body>
</html>
