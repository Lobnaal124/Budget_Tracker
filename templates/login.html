<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>  
     <!--Css link -->
    <link rel="stylesheet" href="{{url_for('static',filename='CSS/style.css')}}">
    <!--bootsrap links -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!--font asesome link-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body class="login">
    <!--header of the budget tracker -->
    <header class="py-4">
        <div class="container">
            <h1 class="fw-bold text-white">
                <i class="bi bi-wallet2 text-primary"></i>
                Budget<span class="text-primary">Tracker</span>
            </h1>
        </div>
    </header>
    <!--input user name and password -->
    <div class="container mt-5">
    
        <div class="row justify-content-center">
    
            <div class="col-md-6 col-lg-4">
    
                <div class="card shadow-lg border-0 rounded-4 p-4">
    
                    <h2 class="text-center mb-4">
                        Welcome Back
                    </h2>
    
                    <form id="login">
    
                        <!-- Username -->
                        <div class="mb-3" >
                            <label class="form-label">
                                Username
                            </label>
    
                            <input
                                type="text"
                                class="form-control"
                                placeholder="Enter your username"
                                id="username"
                                required>
                                <div id="usernameError" class="invalid-feedback"></div>
                        </div>
    
                        <!-- Password -->
                        <div class="mb-4">
                            <label class="form-label">
                                Password
                            </label>
    
                            <input
                                type="password"
                                class="form-control"
                                placeholder="Enter your password"
                                id="password"
                                required>
                                <div id="passwordError" class="invalid-feedback"></div>
                        </div>
    
                        <!-- Login Button -->
                        <div class="d-grid gap-3">
                            <button type="submit" class="btn btn-primary btn-lg ">
                                Login
                            </button>
                            <div class="text-center mt-3">
                                <span class="text-secondary">
                                    Don't have an account?
                                </span>
                            
                                <a href="/register" class="text-primary text-decoration-none fw-semibold ms-1">
                                    Sign Up
                                </a>
                            </div>
                        </div>
    
                    </form>
    
                </div>
    
            </div>
    
        </div>
    
    </div>

    <script src="{{url_for('static',filename='javascript/login.js')}}"></script>

</body>
</html>
